upstream nodeservers {
    server nodeserver:3001;
    server nodeserver2:3001;
}

upstream shopui_upstream {
    server shopui:8082;
}

server {
    listen 80;

    # -------------------------
    # API -> Node
    # -------------------------
    location ^~ /api/ {
        # OPTIONAL: strip /api prefix so node receives /...
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass http://nodeservers;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS (only for API)
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin,X-Requested-With,Content-Type,Accept,Authorization" always;
        add_header Vary "Origin" always;

        if ($request_method = OPTIONS) {
            add_header Content-Length 0;
            add_header Content-Type "text/plain; charset=UTF-8";
            return 204;
        }
    }

    # -------------------------
    # UI -> Nuxt (everything else)
    # -------------------------

    location = /_loading/sse {
        proxy_pass http://shopui_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: don't buffer, keep it open
        proxy_buffering off;
        proxy_cache off;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        add_header Cache-Control "no-cache";
    }

    location / {
        proxy_pass http://shopui_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        send_timeout 3600s;
        proxy_buffering off;
    }
}